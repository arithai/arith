狗尾草（學名：Setaria viridis），又名綠狗尾草、谷莠子、
狗尾巴草。一年生草本植物，稈直立或基部膝曲，高30-100厘米。
葉片扁平，狹披針形或線狀披針形，圓錐花序緊密呈圓柱形，
剛毛粗糙，通常綠色或褐黃色。
界：植物界 Plantae
演化支：維管束植物 Tracheophyta
演化支：被子植物 Angiosperms
演化支：單子葉植物 Monocots
演化支：鴨跖草類植物 Commelinids
目：禾本目 Poales
科：禾本科 Poaceae
屬：狗尾草屬 Setaria
種：狗尾草 S. viridis
二名法
Setaria viridis
