軟枝黃蟬是一種攀緣性常綠灌木，藤本可長達5-10公尺呈彎垂狀。
葉背主脈披柔毛近無柄，
單葉3-4片輪生，有時對生或在枝條的上部亙生，披針或倒披針狀，
長10-15公分，闊2.5-3公分。
界：植物界 Plantae
演化支：維管束植物 Tracheophyta
演化支：被子植物 Angiosperms
演化支：真雙子葉植物 Eudicots
演化支：菊類植物 Asterids
目：龍膽目 Gentianales
科：夾竹桃科 Apocynaceae
屬：黃蟬屬 Allamanda
種：軟枝黃蟬 A. cathartica
二名法
Allamanda cathartica
