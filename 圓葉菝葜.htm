圆叶菝葜（学名：Smilax bauhinioides）为百合科菝葜属下的一个种。 
葉子為綠色有光澤，有葉柄，互生，葉形成圓形或心形，長5至13公分。
綠刺藤利用葉柄上的綠色捲鬚攀爬在其他植物上。
界：植物界 Plantae
演化支：维管植物 Tracheophyta
